name: Generate Singapore Public Holiday from MOM
run-name: ${{ github.actor }} is generating Singapore public holiday JSON file
on: [push]
permissions:
  contents: write
jobs:
  generate-public-holiday:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.2'
    
    - name: Generate public holiday JSON
      run: go run .
    
    - name: List "data" directory
      run: ls ./data
    
    - name: Commit generated files
      uses: actions/checkout@v4
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "generated"
        git push

